<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anime Nova Full Working Safe</title><style>
:root{--bg:#080816;--panel:rgba(255,255,255,.08);--panel2:rgba(255,255,255,.12);--text:#f7f7ff;--muted:#aeb3d6;--a:#8b5cf6;--b:#06b6d4;--good:#22c55e;--bad:#ef4444;--warn:#f59e0b}body.light{--bg:#f4f7ff;--panel:#fff;--panel2:#eef2ff;--text:#111827;--muted:#4b5563}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#2b1055,var(--bg) 45%);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}.wrap{max-width:1280px;margin:auto;padding:22px}.login{max-width:420px;margin:12vh auto;background:var(--panel);padding:28px;border:1px solid var(--panel2);border-radius:28px;box-shadow:0 24px 80px #0008}.top{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:16px}.brand h1{margin:0;font-size:30px}.brand p{margin:6px 0;color:var(--muted)}.pill{display:inline-flex;gap:8px;align-items:center;background:linear-gradient(90deg,var(--a),var(--b));padding:8px 13px;border-radius:999px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{grid-column:span 6;background:var(--panel);backdrop-filter:blur(15px);border:1px solid var(--panel2);border-radius:24px;padding:18px;box-shadow:0 20px 55px #0004}.card.full{grid-column:span 12}.card.third{grid-column:span 4}.card h2,.card h3{margin:0 0 12px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0}.stat{background:var(--panel);border:1px solid var(--panel2);border-radius:22px;padding:16px}.stat span{display:block;color:var(--muted);font-size:13px}.stat b{font-size:24px}button,input,textarea,select{font:inherit;border:0;border-radius:14px}input,textarea,select{width:100%;background:rgba(255,255,255,.11);color:var(--text);border:1px solid var(--panel2);padding:12px;margin:6px 0}textarea{min-height:100px}button{cursor:pointer;padding:11px 15px;font-weight:800;color:white;background:linear-gradient(90deg,var(--a),var(--b));margin:4px}button.secondary{background:var(--panel2);color:var(--text)}button.small{padding:8px 10px;font-size:13px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.row{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--panel2);padding:10px 0;gap:10px}.row:last-child{border-bottom:0}.toggle{min-width:78px;background:#334155}.toggle.on{background:var(--good)}.toggle.off{background:#64748b}.toggle.blocked{background:var(--bad)}.badge{display:inline-block;margin-left:8px;padding:3px 8px;border-radius:999px;background:#ef444433;color:#fecaca;font-size:12px}.item,.draft,.log{background:rgba(255,255,255,.07);border:1px solid var(--panel2);border-radius:18px;padding:12px;margin:10px 0}.draft b{color:#fff}.muted{color:var(--muted)}pre{white-space:pre-wrap;background:#0004;padding:12px;border-radius:14px;overflow:auto}.notice{position:fixed;right:18px;bottom:18px;z-index:5;padding:14px 18px;background:linear-gradient(90deg,var(--a),var(--b));border-radius:18px;box-shadow:0 10px 40px #0008}.hidden{display:none}.warn{background:#f59e0b22;border:1px solid #f59e0b77;border-radius:18px;padding:12px;margin:12px 0;color:#fde68a}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.tab{background:var(--panel2)}.tab.active{background:linear-gradient(90deg,var(--a),var(--b))}.section{display:none}.section.active{display:block}.inline{display:grid;grid-template-columns:1fr 1fr;gap:8px}.chart{height:120px;display:flex;align-items:end;gap:8px}.bar{flex:1;background:linear-gradient(180deg,var(--b),var(--a));border-radius:10px 10px 0 0;min-height:8px}.watermark-preview{max-width:100%;border-radius:18px;margin-top:10px}@media(max-width:900px){.card,.card.third{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.top{display:block}.inline{grid-template-columns:1fr}}
</style></head><body><div id="root"></div><div id="notice" class="notice hidden"></div><script>
let token=localStorage.getItem('anime_token')||'';let state={};let active='dashboard';let root=document.getElementById('root');function note(t){let n=document.getElementById('notice');n.textContent=t;n.classList.remove('hidden');setTimeout(()=>n.classList.add('hidden'),3200)}async function api(url,opt={}){opt.headers=Object.assign({'Content-Type':'application/json'},opt.headers||{});if(token)opt.headers.Authorization='Bearer '+token;let r=await fetch(url,opt);let txt=await r.text();let data;try{data=JSON.parse(txt)}catch{data=txt}if(!r.ok)throw new Error((data&&data.detail)||txt||'Error');return data}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function label(k){return k.replaceAll('_',' ').replace(/\b\w/g,c=>c.toUpperCase())}function loginPage(){root.innerHTML=`<div class="login"><div class="pill">Anime Nova</div><h1>Secure Dashboard</h1><p class="muted">Login from backend. No Vite/npm required.</p><input id="u" placeholder="Username" value="admin"><input id="p" placeholder="Password" type="password" value="12345"><button onclick="login()">Login</button><p class="muted">Open: http://127.0.0.1:8000/app</p></div>`}async function login(){try{let r=await api('/api/login',{method:'POST',body:JSON.stringify({username:u.value,password:p.value})});token=r.token;localStorage.setItem('anime_token',token);await load()}catch(e){note(e.message)}}function logout(){localStorage.removeItem('anime_token');token='';loginPage()}async function load(){try{state=await api('/api/state');render()}catch(e){loginPage();note(e.message)}}function tab(t){active=t;render()}function header(){return `<div class="wrap"><div class="top"><div class="brand"><h1>Anime Nova Full Working Safe</h1><p>${esc(state.brand)} · Backend dashboard · Nova-style controls</p></div><div><span class="pill">Live Safe Mode</span><button class="secondary" onclick="document.body.classList.toggle('light')">Dark/Light</button><button class="secondary" onclick="logout()">Logout</button></div></div><div class="warn">Safe limit: this app creates plans, drafts, captions, safe replies, watermark files, analytics and official API publish helper. It will not scrape copyrighted anime, fake likes, mass comment, bypass detection, or auto follow/unfollow.</div><div class="stats"><div class="stat"><span>Drafts</span><b>${state.drafts.length}</b></div><div class="stat"><span>Growth Tracking</span><b>${state.growth.length}</b></div><div class="stat"><span>Suggestions</span><b>${state.suggestions.length}</b></div><div class="stat"><span>Analytics</span><b>${state.analytics.length}</b></div><div class="stat"><span>Auto Publish</span><b>${state.auto_publish_enabled?'ON':'OFF'}</b></div></div><div class="tabs">${['dashboard','settings','content','growth','reply','analytics','profile','watermark','logs'].map(x=>`<button class="tab ${active==x?'active':''}" onclick="tab('${x}')">${label(x)}</button>`).join('')}</div>`}
function groups(){return [['Safe Autopilot',['safe_autopilot','approval_screen','daily_random_scheduler','content_calendar','post_frequency_planner','activity_logs','password_lock','personal_info_protection','dark_light_mode','animated_cards','analytics_charts','mobile_responsive_layout','live_status_indicators']],['Content Brain',['ai_anime_content_brain','auto_generate_posts','auto_generate_stories','auto_generate_reels','auto_caption_generator','auto_hashtag_generator','anime_trend_suggestions','duplicate_post_block']],['Reply Safety',['auto_reply_comments','auto_reply_dm','auto_chat_reply','natural_safe_reply','brand_transparent_reply','safe_dm_reply_assistant','comment_reply_assistant','auto_reply_style_selector','nsfw_block','spam_block','scam_block','abusive_block','unknown_link_block']],['Planner Tools',['auto_highlight_planner','auto_story_planner','auto_reel_script_generator','auto_bio_generator','profile_rotation_planner','business_creator_api_support','auto_watermark','watermark_anim_funzon']],['Growth Safe Tools',['growth_assistant','followback_tracker','growth_suggestions','safe_engagement_analytics','activity_heatmap','best_posting_time_analytics']],['Risky Visible But Blocked',['auto_follow','auto_unfollow','mass_comment','mass_like','fake_likes','fake_engagement','spam_dm','detection_bypass','pretend_human_mode','scrape_other_creators','download_copyright_anime','adult_18_content','hentai_nsfw_content']]]}
async function toggle(k){let blocked=state.blocked_keys.includes(k);if(blocked){alert('Warning: '+label(k)+' is risky/spam/copyright/adult/bypass related. Cancel/Confirm dono case me feature run nahi hoga. Blocked for safety.')}try{await api('/api/settings',{method:'POST',body:JSON.stringify({key:k,value:!state.settings[k]})});await load();note(label(k)+' updated')}catch(e){note(e.message)}}function settingsHtml(){return `<div class="grid">${groups().map(g=>`<div class="card"><h2>${g[0]}</h2>${g[1].map(k=>{let v=state.settings[k];if(v===undefined)return '';let b=state.blocked_keys.includes(k);return `<div class="row"><div><b>${label(k)}</b>${b?'<span class="badge">Blocked</span>':''}</div><button class="toggle ${b?'blocked':(v?'on':'off')}" onclick="toggle('${k}')">${v?'ON':'OFF'}</button></div>`}).join('')}</div>`).join('')}</div>`}
async function generateDaily(){try{let r=await api('/api/content/generate-daily',{method:'POST'});note('Generated '+r.drafts.length+' new drafts');await load()}catch(e){note(e.message)}}async function approve(id){try{await api('/api/content/approve',{method:'POST',body:JSON.stringify({draft_id:id})});note('Approved #'+id);await load()}catch(e){note(e.message)}}async function saveUrl(id){try{await api('/api/content/public-url',{method:'POST',body:JSON.stringify({draft_id:id,public_media_url:document.getElementById('url'+id).value})});note('Public URL saved');await load()}catch(e){note(e.message)}}async function publishNow(id){try{let r=await api('/api/content/publish-now',{method:'POST',body:JSON.stringify({draft_id:id})});alert(JSON.stringify(r,null,2));await load()}catch(e){note(e.message)}}async function testIG(){try{let r=await api('/api/instagram/test');alert(JSON.stringify(r,null,2));await load()}catch(e){note(e.message)}}function draftHtml(d){return `<div class="draft"><b>#${d.id} ${esc(d.slot)} · ${esc(d.type)} · ${esc(d.category)}</b><p><b>${esc(d.topic)}</b></p><p>${esc(d.caption).replaceAll('\n','<br>')}</p><p>${(d.hashtags||[]).map(esc).join(' ')}</p><p>Status: <b>${esc(d.status)}</b> · Schedule: ${esc(d.scheduled_time)}</p>${d.safety_reasons?.length?`<p class="badge">${d.safety_reasons.map(esc).join(', ')}</p>`:''}<details><summary>Script / Reel Plan</summary><pre>${esc(d.script)}</pre></details><div class="inline"><input id="url${d.id}" placeholder="Public HTTPS media URL" value="${esc(d.public_media_url||'')}"><button class="secondary small" onclick="saveUrl(${d.id})">Save URL</button></div><button class="primary small" onclick="approve(${d.id})">Approve</button><button class="primary small" onclick="publishNow(${d.id})">Publish Now</button></div>`}
function contentHtml(){return `<div class="actions"><button onclick="generateDaily()">Generate Drafts 3-5</button><button onclick="testIG()">Test Instagram Token</button><button class="secondary" onclick="load()">Refresh</button></div><div class="grid"><div class="card full"><h2>Daily Post / Story / Reel Drafts</h2><p class="muted">Morning, afternoon, evening, night and extra content plans with caption + hashtags + watermark instruction.</p>${state.drafts.length?state.drafts.map(draftHtml).join(''):'<p>No drafts yet. Click Generate Drafts.</p>'}</div></div>`}
async function growthSuggestions(){try{await api('/api/growth/suggestions');note('Growth suggestions refreshed');await load()}catch(e){note(e.message)}}async function trackName(n){try{await api('/api/growth/track',{method:'POST',body:JSON.stringify({username:n})});note('Added to tracker');await load()}catch(e){note(e.message)}}async function trackInput(){trackName(document.getElementById('trackUser').value)}async function followback(id,val){try{await api('/api/growth/followback',{method:'POST',body:JSON.stringify({account_id:id,followed_back:val})});note('Followback status updated');await load()}catch(e){note(e.message)}}function growthHtml(){let now=new Date();let reminders=state.growth.filter(x=>((now-new Date(x.followed_on))/(86400000)>=7)&&!x.followed_back).length;return `<div class="actions"><button onclick="growthSuggestions()">Growth Suggestions</button><button class="secondary" onclick="load()">7-Day Reminder Report</button></div><div class="grid"><div class="card"><h2>Anime Related Suggestions</h2>${state.suggestions.length?state.suggestions.map(s=>`<div class="item"><b>@${esc(s.username)}</b><p>${esc(s.reason)}</p><button class="small" onclick="trackName('${esc(s.username)}')">Add to Tracker</button></div>`).join(''):'<p>Click Growth Suggestions.</p>'}</div><div class="card"><h2>Followback Tracker</h2><p class="muted">7-day reminder only. No auto follow/unfollow.</p><div class="inline"><input id="trackUser" placeholder="@username manually followed"><button onclick="trackInput()">Add</button></div><p><b>${reminders}</b> accounts need 7-day review.</p>${state.growth.length?state.growth.map(x=>`<div class="item"><b>@${esc(x.username)}</b><p>${esc(x.status)} · followed back: ${x.followed_back?'yes':'no'}</p><button class="small secondary" onclick="followback(${x.id},true)">Followed back / Keep</button><button class="small secondary" onclick="followback(${x.id},false)">Still Tracking</button></div>`).join(''):'<p>No tracked accounts.</p>'}</div></div>`}
async function replyTest(){try{let r=await api('/api/reply',{method:'POST',body:JSON.stringify({message:replyMsg.value,style:replyStyle.value})});replyOut.textContent=JSON.stringify(r,null,2);await load();note('Reply generated')}catch(e){note(e.message)}}function replyHtml(){return `<div class="grid"><div class="card"><h2>Natural Safe Comment/DM/Chat Reply</h2><select id="replyStyle"><option>friendly</option><option>funny</option><option>cute</option><option>professional</option><option>anime fan style</option></select><textarea id="replyMsg">hello action anime chahiye</textarea><button onclick="replyTest()">Natural Reply Test</button><pre id="replyOut"></pre></div><div class="card"><h2>Reply History</h2>${state.reply_tests.slice(0,8).map(r=>`<div class="item"><b>${esc(r.style)}</b><p>${esc(r.message)}</p><p>${r.hold?'HELD':'Reply: '+esc(r.reply)}</p></div>`).join('')}</div></div>`}
async function addAnalytics(){try{await api('/api/analytics/add',{method:'POST',body:JSON.stringify({category:anCat.value,content_type:anType.value,slot:anSlot.value,likes:+likes.value,comments:+comments.value,saves:+saves.value,shares:+shares.value})});note('Analytics added');await load()}catch(e){note(e.message)}}function analyticsHtml(){let rec=state.recommendation||{};let max=Math.max(1,...state.analytics.slice(0,10).map(a=>a.score));return `<div class="grid"><div class="card"><h2>Best Posting Time Analytics</h2><p><b>Best topic:</b> ${esc(rec.best_topic)}</p><p><b>Best time:</b> ${esc(rec.best_time)}</p><p class="muted">${esc(rec.reason)}</p><div class="chart">${state.analytics.slice(0,10).reverse().map(a=>`<div title="${esc(a.category)} score ${a.score}" class="bar" style="height:${Math.max(8,(a.score/max)*115)}px"></div>`).join('')}</div></div><div class="card"><h2>Add Engagement Data</h2><div class="inline"><select id="anCat"><option>cute</option><option>funny</option><option>action</option><option>adventure</option><option>romantic</option><option>quotes</option><option>memes</option></select><select id="anType"><option>post</option><option>story</option><option>reel</option></select></div><select id="anSlot"><option>Morning</option><option>Afternoon</option><option>Evening</option><option>Night</option><option>Extra</option></select><div class="inline"><input id="likes" type="number" value="10" placeholder="likes"><input id="comments" type="number" value="2" placeholder="comments"><input id="saves" type="number" value="1" placeholder="saves"><input id="shares" type="number" value="1" placeholder="shares"></div><button onclick="addAnalytics()">Add Analytics</button></div><div class="card full"><h2>Saved Analytics</h2>${state.analytics.slice(0,20).map(a=>`<div class="item">${esc(a.category)} / ${esc(a.content_type)} / ${esc(a.slot)} · score <b>${a.score}</b></div>`).join('')}</div></div>`}
async function makeHighlight(){try{await api('/api/highlight/generate',{method:'POST'});note('Highlight plan created');await load()}catch(e){note(e.message)}}async function makeProfile(){try{await api('/api/profile/plan',{method:'POST',body:JSON.stringify({period:period.value})});note('Profile plan created');await load()}catch(e){note(e.message)}}function profileHtml(){return `<div class="actions"><button onclick="makeHighlight()">Auto Highlight Planner</button><select id="period"><option value="10_days">10 days</option><option value="20_days">20 days</option><option value="1_month">1 month</option><option value="2_months">2 months</option><option value="5_months">5 months</option><option value="1_year">1 year</option></select><button onclick="makeProfile()">Profile Rotation Planner</button></div><div class="grid"><div class="card"><h2>Highlight Plans</h2>${state.highlights.length?state.highlights.map(h=>`<div class="item"><b>${esc(h.title)}</b><p>Cover text: ${esc(h.cover_text)}</p><p>${(h.story_ideas||[]).map(esc).join('<br>')}</p></div>`).join(''):'<p>No highlight plan yet.</p>'}</div><div class="card"><h2>Profile / Bio Plans</h2>${state.profiles.length?state.profiles.map(p=>`<div class="item"><b>${esc(p.period)}</b><p>${esc(p.bio).replaceAll('\n','<br>')}</p><p>${esc(p.highlight_cover_style)} · ${esc(p.theme_color)}</p><p>Next change: ${esc(p.next_change)}</p></div>`).join(''):'<p>No profile plan yet.</p>'}</div></div>`}
async function uploadWatermark(){try{let f=document.getElementById('wmfile').files[0];if(!f){note('Select image first');return}let fd=new FormData();fd.append('file',f);let r=await fetch('/api/watermark',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});let d=await r.json();if(!r.ok)throw new Error(d.detail||'Upload failed');wmout.innerHTML=`<p>Watermarked file ready:</p><a href="${d.download_url}" target="_blank">Open / Download</a><br><img class="watermark-preview" src="${d.download_url}">`;await load();note('Watermark added')}catch(e){note(e.message)}}function watermarkHtml(){return `<div class="grid"><div class="card"><h2>Image Watermark Tool</h2><p class="muted">Adds ${esc(state.brand)} watermark on your uploaded/owned image.</p><input id="wmfile" type="file" accept="image/*"><button onclick="uploadWatermark()">Add Watermark</button><div id="wmout"></div></div><div class="card"><h2>Posting Note</h2><p>Instagram API needs public HTTPS image/video URL. Local PC files need hosting first. Use only your own or properly licensed media.</p><button onclick="testIG()">Test Instagram Token</button></div></div>`}
function dashboardHtml(){return `<div class="actions"><button onclick="generateDaily()">Generate Drafts</button><button onclick="growthSuggestions()">Growth Suggestions</button><button onclick="makeHighlight()">Highlight Planner</button><button onclick="testIG()">Test Instagram Token</button></div><div class="grid"><div class="card third"><h2>Safe Autopilot</h2><p>${state.settings.safe_autopilot?'ON':'OFF'}</p><p class="muted">Daily scheduler, draft generation, safe guards, logs.</p></div><div class="card third"><h2>Token</h2><p>${state.token_present?'Present':'Missing/Masked'}</p><p class="muted">Use Test Instagram Token.</p></div><div class="card third"><h2>Best Plan</h2><p>${esc(state.recommendation.best_topic)} · ${esc(state.recommendation.best_time)}</p></div><div class="card"><h2>Latest Drafts</h2>${state.drafts.slice(0,3).map(draftHtml).join('')||'<p>No drafts yet.</p>'}</div><div class="card"><h2>Live Logs</h2>${state.logs.slice(0,8).map(l=>`<div class="log"><b>${esc(l.event)}</b><p class="muted">${esc(l.time)}</p><p>${esc(l.message)}</p></div>`).join('')}</div></div>`}
function logsHtml(){return `<div class="card full"><h2>Activity Logs</h2>${state.logs.map(l=>`<div class="log"><b>${esc(l.event)}</b><p class="muted">${esc(l.time)}</p><p>${esc(l.message)}</p></div>`).join('')}</div>`}function render(){let body={dashboard:dashboardHtml,settings:settingsHtml,content:contentHtml,growth:growthHtml,reply:replyHtml,analytics:analyticsHtml,profile:profileHtml,watermark:watermarkHtml,logs:logsHtml}[active]();root.innerHTML=header()+body+'</div>'}if(token)load();else loginPage();
</script></body></html>
