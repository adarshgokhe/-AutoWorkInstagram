<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Anime Nova Autopilot</title>
  <style>
    :root{--bg:#080816;--panel:#17172a;--panel2:#24243c;--text:#f7f7ff;--muted:#b6bad8;--a:#8b5cf6;--b:#06b6d4;--good:#22c55e;--bad:#ef4444;--warn:#f59e0b}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#120923,#071827 55%,#0b1020);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
    .wrap{max-width:1180px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center}.brand h1{margin:0;font-size:32px}.brand p{margin:7px 0;color:var(--muted)}
    .pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 13px;background:linear-gradient(90deg,var(--a),var(--b));font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:16px}.card{grid-column:span 6;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:18px;box-shadow:0 24px 70px #0006}.card.full{grid-column:span 12}.card.third{grid-column:span 4}
    h2,h3{margin:0 0 12px}.muted{color:var(--muted)}button,input,select,textarea{font:inherit;border:0;border-radius:13px}button{cursor:pointer;color:white;font-weight:850;padding:12px 16px;margin:4px;background:linear-gradient(90deg,var(--a),var(--b))}button.secondary{background:var(--panel2)}button.danger{background:#7f1d1d}input,textarea{width:100%;padding:12px;background:var(--panel2);border:1px solid rgba(255,255,255,.12);color:var(--text)}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:18px}.stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px}.stat span{display:block;color:var(--muted);font-size:13px}.stat b{font-size:26px}.ok{color:#86efac}.bad{color:#fecaca}.warn{color:#fde68a}
    .item{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px;margin:10px 0}.item b{display:block;margin-bottom:5px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.notice{position:fixed;right:18px;bottom:18px;z-index:5;padding:14px 18px;background:linear-gradient(90deg,var(--a),var(--b));border-radius:18px;box-shadow:0 10px 40px #0008}.hidden{display:none}
    .result{display:none;background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.35);border-radius:14px;padding:12px;margin-top:12px;color:var(--text);line-height:1.45}.result.show{display:block}.result div{margin:4px 0}.result .bad{color:#fecaca}.result .ok{color:#86efac}.mono{font-family:Consolas,monospace;word-break:break-word}.copybox{background:#0005;border-radius:12px;padding:10px;margin:8px 0}
    .login{max-width:420px;margin:12vh auto;background:var(--panel);padding:28px;border:1px solid var(--panel2);border-radius:22px}
    .small{font-size:13px}
    @media(max-width:850px){.card,.card.third{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.top{display:block}}
  </style>
</head>
<body>
<div id="root"></div>
<div id="notice" class="notice hidden"></div>
<script>
let token=localStorage.getItem('anime_token')||'';let state={};let root=document.getElementById('root');
function note(t){let n=document.getElementById('notice');n.textContent=t;n.classList.remove('hidden');setTimeout(()=>n.classList.add('hidden'),3600)}
async function api(url,opt={}){opt.headers=Object.assign({'Content-Type':'application/json'},opt.headers||{});if(token)opt.headers.Authorization='Bearer '+token;let r=await fetch(url,opt);let txt=await r.text();let data;try{data=JSON.parse(txt)}catch{data=txt}if(!r.ok)throw new Error((data&&data.detail)||txt||'Error');return data}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function loginPage(){root.innerHTML=`<div class="login"><span class="pill">Anime Nova</span><h1>Secure Login</h1><p class="muted">Autopilot dashboard</p><input id="u" placeholder="Username" autocomplete="username"><br><br><input id="p" type="password" placeholder="Password" autocomplete="current-password"><br><br><button onclick="login()">Login</button></div>`}
async function login(){try{let r=await api('/api/login',{method:'POST',body:JSON.stringify({username:u.value,password:p.value})});token=r.token;localStorage.setItem('anime_token',token);await load()}catch(e){note(e.message)}}
function logout(){localStorage.removeItem('anime_token');token='';loginPage()}
async function load(){try{state=await api('/api/state');render()}catch(e){loginPage();note(e.message)}}
async function enableSafe(){try{await api('/api/settings/enable-safe-autopilot',{method:'POST'});note('Safe autopilot restored');await load()}catch(e){note(e.message)}}
function asLines(r){
  if(!r)return ['No response'];
  if(r.diagnostic)return asLines(Object.assign({}, r.diagnostic, {publish_paused:r.publish_paused, publish_paused_until:r.publish_paused_until}));
  if(r.connected===false)return [`Instagram blocked: ${r.stage||'token_error'}`, r.message||'Instagram token not connected.', ...(r.fix_steps||[])];
  if(r.instagram_connected===false)return ['Instagram blocked', r.blocker||'Token/API permission is not connected.'];
  if(r.public_webhook||r.subscription){
    let lines=[];
    if(r.token)lines.push(`Token: ${r.token.connected?'OK':'BLOCKED'} ${r.token.username||''}`);
    if(r.public_webhook)lines.push(`Public webhook: ${r.public_webhook.ok?'OK':'FAILED'} - ${r.public_webhook.message||''}`);
    if(r.subscription)lines.push(`Meta subscription: ${r.subscription.ok?'OK':'MISSING'} - fields: ${(r.subscription.subscribed_fields||[]).join(', ')||'none'}`);
    if(r.conversation_count!==undefined)lines.push(`API conversations: ${r.conversation_count}`);
    if(r.handled!==undefined)lines.push(`Handled messages: ${r.handled}`);
    if(r.blocker)lines.push(`Blocker: ${r.blocker}`);
    if(r.manual_send_note)lines.push(r.manual_send_note);
    if(r.next_actions?.length)lines.push('Next: '+r.next_actions.join(' | '));
    return lines;
  }
  if(r.publish_paused!==undefined||r.queued_ready!==undefined){
    let lines=[];
    lines.push(`Publish queue: ${r.queued_ready||0} ready`);
    lines.push(`Published today: ${r.published_today||0}/${r.daily_limit||0}`);
    lines.push(`Meta publish pause: ${r.publish_paused?'ON':'OFF'}`);
    if(r.publish_paused_until)lines.push(`Resume after: ${r.publish_paused_until}`);
    if(r.latest_error?.message)lines.push(`Latest Meta error: ${r.latest_error.message}`);
    if(r.media_checks?.length)lines.push(`Media check: ${r.media_checks.map(x=>`#${x.draft_id} ${x.media?.ok?'OK':'FAILED'}`).join(', ')}`);
    if(r.message_reply_blocker)lines.push(`Reply blocker: ${r.message_reply_blocker}`);
    if(r.highlight_note)lines.push(r.highlight_note);
    if(r.blockers?.length)lines.push(`Blockers: ${r.blockers.join(' | ')}`);
    return lines;
  }
  if(r.token_status)return [r.message||'Instagram blocked', `${r.token_status.stage||''}: ${r.token_status.message||''}`];
  if(r.retry_failed_replies)return [r.message||'Inbox checked', `Retry: ${r.retry_failed_replies.sent||0}/${r.retry_failed_replies.attempted||0} sent`];
  if(r.publish_paused)return [r.message||'Meta publish pause active'];
  if(Array.isArray(r.results))return [`Autopilot finished`, `Published: ${r.published||0}`, `Items checked: ${r.results.length}`];
  if(r.reply)return [`Reply ready`, r.reply];
  if(r.status)return [`${r.status}`, r.message||'Done'];
  return ['Action completed.'];
}
function setResult(id, lines){
  let el=document.getElementById(id);
  if(!el)return;
  let rows=Array.isArray(lines)?lines:asLines(lines);
  el.classList.add('show');
  el.innerHTML=rows.map(x=>`<div>${esc(x)}</div>`).join('');
}
function showDiag(r,id){let target=id||(document.getElementById('msgDiag')?'msgDiag':'replyOut');setResult(target,r);note(asLines(r)[0])}
async function runNow(){try{note('Autopilot running... wait for Meta processing');let r=await api('/api/autopilot/run-now',{method:'POST'});showDiag(r,'runDiag');await load()}catch(e){note(e.message)}}
async function generate(){try{await api('/api/content/generate-daily',{method:'POST'});note('New content generated');await load()}catch(e){note(e.message)}}
async function prepareQueue(){try{note('Preparing safe queue...');let r=await api('/api/autopilot/prepare-queue',{method:'POST'});showDiag(r,'runDiag');await load()}catch(e){note(e.message)}}
async function diagnosePublish(){try{note('Checking publish pipeline...');let r=await api('/api/publish/diagnostic');showDiag(r,'runDiag');await load()}catch(e){note(e.message)}}
async function testIG(){try{let r=await api('/api/instagram/test');showDiag(r);await load()}catch(e){note(e.message)}}
async function testReply(){try{let r=await api('/api/reply',{method:'POST',body:JSON.stringify({message:replyMsg.value,style:'anime fan style'})});setResult('replyOut', r);await load()}catch(e){note(e.message)}}
async function checkInbox(){try{note('Checking Instagram inbox...');let r=await api('/api/reply/check-inbox',{method:'POST'});showDiag(r);await load()}catch(e){note(e.message)}}
async function retryReplies(){try{note('Retrying queued replies...');let r=await api('/api/reply/retry-failed',{method:'POST'});showDiag(r);await load()}catch(e){note(e.message)}}
async function diagnoseMessaging(){try{note('Checking Meta messaging setup...');let r=await api('/api/instagram/messaging-diagnostic');showDiag(r);await load()}catch(e){note(e.message)}}
async function diagnoseWebhook(){try{note('Checking public webhook...');let r=await api('/api/instagram/webhook-diagnostic');showDiag(r);await load()}catch(e){note(e.message)}}
async function repairWebhook(){try{note('Repairing Meta subscription...');let r=await api('/api/instagram/repair-webhook-subscription',{method:'POST'});showDiag(r);await load()}catch(e){note(e.message)}}
async function rescanStartup(){try{note('Scanning code and env...');let r=await api('/api/diagnostics/rescan',{method:'POST'});showDiag(r);await load()}catch(e){note(e.message)}}
function count(st){return (state.drafts||[]).filter(d=>d.status===st).length}
function mediaRows(){let rows=(state.drafts||[]).slice(0,12);return rows.map(d=>`<div class="item"><b>#${d.id} ${esc(d.type)} - ${esc(d.status)}</b><div>${esc(d.topic||'')}</div><div class="muted small">${d.status==='published'?'Posted to Instagram':d.status==='ready_to_publish'?'Queued for autopilot':'Needs retry'}</div></div>`).join('')||'<p class="muted">No drafts yet.</p>'}
function sourceRows(){let s=state.safe_source_status||{};let rows=s.sources||[];return `<p class="muted">Mode: ${esc(s.mode||'safe')}</p>`+rows.map(x=>`<div class="item"><b>${esc(x.name)} - ${x.ready?'READY':'NEEDS KEY/LICENSE'}</b><div class="muted">${esc(x.use)}</div></div>`).join('')}
function sendText(result){if(!result)return '';if(result.sent)return 'Sent successfully';return `Send status: ${result.response?.error?.message||result.message||'Not sent'}`}
function inboxRows(){let rows=(state.incoming_messages||[]).slice(0,8);return rows.map(r=>`<div class="item"><b>${esc(r.source)} - ${esc(r.status)}</b><div>${esc(r.message)}</div><div class="muted">Reply: ${esc(r.reply||'held')}</div><div class="small muted">${esc(sendText(r.send_result))}</div></div>`).join('')||'<p class="muted">No webhook messages yet. Meta has not sent any DM/comment event to this backend.</p>'}
function startupRows(){let s=state.startup_scan||{};let files=(s.changed_files_since_last_start||[]).join(', ')||'none';let warns=(s.warnings||[]).join(' | ')||'No warnings';return `<p>Status: <b class="${s.status==='ok'?'ok':'warn'}">${esc(s.status||'unknown')}</b></p><p class="muted">Last scan: ${esc(s.time||'not scanned')}</p><p class="muted">Changed files: ${esc(files)}</p><div class="copybox small">${esc(warns)}</div>`}
function replyStatusRows(){let rs=state.reply_status||{};let last=rs.last_event||{};let cls=rs.status==='webhook_received'?'ok':(rs.status?'warn':'bad');return `<p>Status: <b class="${cls}">${esc(rs.status||'unknown')}</b></p><p class="muted">${esc(rs.message||'Run diagnose to check Meta messaging setup.')}</p><p class="muted">Last webhook: ${esc(last.time||'none')}</p><p class="muted">Handled: ${esc(last.handled??0)} - Messaging events: ${esc(last.messaging_count??0)} - Changes: ${esc(last.change_count??0)}</p>`}
function publicStatusRows(){let p=state.public_webhook_status||{};let cls=p.ok?'ok':'bad';return `<div class="item"><b class="${cls}">Public webhook/media host: ${p.ok?'LIVE':'BLOCKED'}</b><div class="muted">${esc(p.message||'Run Publish Diagnostic.')}</div>${p.fix?`<div class="muted">Fix: ${esc(p.fix)}</div>`:''}</div>`}
function render(){
let published=count('published'),ready=count('ready_to_publish'),failed=count('publish_failed');
let webhook=state.webhook_url||'Set PUBLIC_MEDIA_BASE_URL in backend/.env';
let verifyToken=state.webhook_verify_token||'Check backend/.env';
let ig=state.instagram_connection||{};let igKnown=ig.connected!==null&&ig.connected!==undefined;let igOk=ig.connected===true;
let publicOk=state.public_webhook_status?.ok===true;
let fixSteps=(ig.fix_steps||[]).map(x=>`<div class="muted">- ${esc(x)}</div>`).join('');
let igFix=!igOk&&igKnown?`<div class="item"><b class="bad">Meta token blocked</b><div class="muted">Saved token/API access blocked hai. Jab tak fresh valid Instagram Business token backend/.env me nahi aata, DM/comment/post send Meta reject karega.</div>${fixSteps}</div>`:'';
root.innerHTML=`<div class="wrap"><div class="top"><div class="brand"><h1>Anime Nova Autopilot</h1><p>${esc(state.brand)} - direct safe posting dashboard</p></div><div><span class="pill">Safe Autopilot ${state.settings?.safe_autopilot?'ON':'OFF'}</span><button class="secondary" onclick="logout()">Logout</button></div></div>
<div class="stats"><div class="stat"><span>Published</span><b class="ok">${published}</b></div><div class="stat"><span>Ready</span><b>${ready}</b></div><div class="stat"><span>Failed</span><b class="${failed?'bad':'ok'}">${failed}</b></div><div class="stat"><span>Auto Publish</span><b class="${state.auto_publish_enabled?'ok':'bad'}">${state.auto_publish_enabled?'ON':'OFF'}</b></div><div class="stat"><span>Public Host</span><b class="${publicOk?'ok':'bad'}">${publicOk?'LIVE':'BLOCKED'}</b></div></div>
<div class="grid"><div class="card full"><h2>Run Everything</h2><p class="muted">Generates original safe anime posts, stories and reels, adds watermark, uses public HTTPS, then publishes through official Instagram API. Risky follow/unfollow, cold DM, spam and copyrighted scraping stay locked.</p>${publicStatusRows()}<div class="actions"><button onclick="runNow()">Run Autopilot Now</button><button onclick="prepareQueue()">Prepare Safe Queue</button><button onclick="generate()">Generate New Batch</button><button onclick="enableSafe()">Restore Safe Settings</button><button class="secondary" onclick="diagnosePublish()">Publish Diagnostic</button><button class="secondary" onclick="testIG()">Check Instagram ID</button><button class="secondary" onclick="rescanStartup()">Scan Code/Env</button><button class="secondary" onclick="load()">Refresh</button></div><div id="runDiag" class="result"></div></div>
<div class="card"><h2>Instagram Replies</h2><p>Instagram connection: <b class="${igOk?'ok':igKnown?'bad':'warn'}">${igOk?'CONNECTED':igKnown?'BLOCKED':'NOT CHECKED'}</b></p><p class="muted">${esc(ig.stage||'not_checked')} - ${esc(ig.message||'Click Check Instagram ID.')}</p>${igFix}<p>Token saved: <b class="${state.token_present?'ok':'bad'}">${state.token_present?'YES':'NO'}</b></p><p>Auto replies: <b class="${state.auto_reply_send_enabled?'ok':'bad'}">${state.auto_reply_send_enabled?'ON':'OFF'}</b></p><p>Inbox polling: <b class="${state.inbox_poll_enabled?'ok':'bad'}">${state.inbox_poll_enabled?'ON':'OFF'}</b></p>${replyStatusRows()}<p class="muted">DM/comment/story reply official Meta webhook se chalega. Browser-thread number API recipient ID nahi hota.</p><div class="copybox small"><div class="mono">${esc(webhook)}</div><div>Verify token: ${esc(verifyToken)}</div></div><button onclick="checkInbox()">Check Inbox Now</button><button onclick="retryReplies()">Retry Queued Replies</button><button class="secondary" onclick="diagnoseMessaging()">Diagnose Messaging</button><button class="secondary" onclick="diagnoseWebhook()">Webhook Diagnostic</button><button class="secondary" onclick="repairWebhook()">Repair Subscription</button><div id="msgDiag" class="result"></div></div>
<div class="card"><h2>Nova Reply Brain</h2><p class="muted">Nova assistant: ${esc(state.nova_assistant?.engine||'local')} - Roman Hinglish safe anime replies.</p><textarea id="replyMsg">Hello action anime chahiye</textarea><button onclick="testReply()">Test Reply Brain</button><div id="replyOut" class="result"></div></div>
<div class="card"><h2>Latest Media Work</h2>${mediaRows()}</div>
<div class="card"><h2>Safe Sources</h2>${sourceRows()}</div>
<div class="card"><h2>Incoming Replies</h2>${inboxRows()}</div>
<div class="card"><h2>Startup Scan</h2>${startupRows()}</div></div></div>`}
if(token)load();else loginPage();
</script>
</body>
</html>
